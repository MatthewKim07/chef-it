name: ChefIt
options:
  bundleIdPrefix: com.chefit
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.10"
    DEVELOPMENT_TEAM: ""
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    EDAMAM_APP_ID: ""
    EDAMAM_APP_KEY: ""
    AUTH_BASE_URL: "http://127.0.0.1:3000"

packages:
  ChefItKit:
    path: .

targets:
  ChefIt:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    configFiles:
      Debug: Secrets.xcconfig
      Release: Secrets.xcconfig
    sources:
      - path: App/ChefIt/ChefItApp.swift
      - path: App/ChefIt/RootView.swift
      - path: App/ChefIt/Components
      - path: App/ChefIt/Design
      - path: App/ChefIt/Navigation
      - path: App/ChefIt/Screens
      - path: App/ChefIt/Assets.xcassets
        buildPhase: resources
      - path: App/ChefIt/Resources
        buildPhase: resources
    info:
      path: App/ChefIt/Info.plist
      properties:
        EDAMAM_APP_ID: $(EDAMAM_APP_ID)
        EDAMAM_APP_KEY: $(EDAMAM_APP_KEY)
        AUTH_BASE_URL: $(AUTH_BASE_URL)
        GEMINI_API_KEY: $(GEMINI_API_KEY)
        OPENAI_API_KEY: $(OPENAI_API_KEY)
        NSCameraUsageDescription: "Chef It uses your camera to scan ingredients in your pantry."
        NSPhotoLibraryUsageDescription: "Chef It can scan photos from your library to detect ingredients."
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
          UISceneConfigurations: {}
        UILaunchScreen:
          UIColorName: ChefitLaunchCream
        UIAppFonts:
          - Nunito-Variable.ttf
          - PlayfairDisplay-Variable.ttf
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.chefit.app
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        TARGETED_DEVICE_FAMILY: "1,2"
        GENERATE_INFOPLIST_FILE: NO
        SWIFT_EMIT_LOC_STRINGS: YES
    dependencies:
      - package: ChefItKit
        product: ChefItKit

  ChefItKitTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Tests/ChefItKitTests
    dependencies:
      - package: ChefItKit
        product: ChefItKit

schemes:
  ChefIt:
    build:
      targets:
        ChefIt: all
    run:
      config: Debug
      environmentVariables:
        EDAMAM_APP_ID: ""
        EDAMAM_APP_KEY: ""
        AUTH_BASE_URL: $(AUTH_BASE_URL)
    test:
      config: Debug
      targets:
        - ChefItKitTests
    archive:
      config: Release
