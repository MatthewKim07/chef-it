name: ChefIt
options:
  bundleIdPrefix: com.chefit
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.10"
    DEVELOPMENT_TEAM: ""
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    EDAMAM_APP_ID: ""
    EDAMAM_APP_KEY: ""

packages:
  ChefItKit:
    path: .

targets:
  ChefIt:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: App/ChefIt
      - path: App/ChefIt/Resources
        buildPhase: resources
    info:
      path: App/ChefIt/Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.chefit.app
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        TARGETED_DEVICE_FAMILY: "1,2"
        GENERATE_INFOPLIST_FILE: NO
        SWIFT_EMIT_LOC_STRINGS: YES
    dependencies:
      - package: ChefItKit
        product: ChefItKit

  ChefItKitTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Tests/ChefItKitTests
    dependencies:
      - package: ChefItKit
        product: ChefItKit

schemes:
  ChefIt:
    build:
      targets:
        ChefIt: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - ChefItKitTests
    archive:
      config: Release
